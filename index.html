<!doctype html>
<html lang="fr">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/Logo.svg" />

    <!-- Preconnect pour les fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts non-bloquantes -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap"
      />
    </noscript>

    <!-- Préchargement LCP -->
    <link rel="preload" as="image" href="/images/projectpics/Landing/bar_full.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/projectpics/delivecrous/Home_Full.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/projectpics/Landing/pain_full.webp" fetchpriority="high" />

    <!-- reCAPTCHA async / defer -->
    <script 
      src="https://www.google.com/recaptcha/api.js?render=VITE_RECAPTCHA_SITE_KEY"
      async
      defer
    ></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
